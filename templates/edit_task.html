{% extends "base.html" %}
{% block title %}Edit Task{% endblock %}
{% block page_title %}Edit Task{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-body p-4">
        <h5 class="fw-semibold mb-4"><i class="bi bi-pencil-square me-2" style="color:#4f46e5"></i>Edit Task</h5>
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold">Title</label>
            <input type="text" name="title" class="form-control" value="{{ task.title }}" required/>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Description</label>
            <textarea name="description" class="form-control" rows="3">{{ task.description or '' }}</textarea>
          </div>
          <div class="row g-3 mb-3">
            <div class="col">
              <label class="form-label fw-semibold">Priority</label>
              <select name="priority" class="form-select">
                <option value="low"    {% if task.priority == 'low'    %}selected{% endif %}>Low</option>
                <option value="medium" {% if task.priority == 'medium' %}selected{% endif %}>Medium</option>
                <option value="high"   {% if task.priority == 'high'   %}selected{% endif %}>High</option>
              </select>
            </div>
            <div class="col">
              <label class="form-label fw-semibold">Status</label>
              <select name="status" class="form-select">
                <option value="todo"        {% if task.status == 'todo'        %}selected{% endif %}>To Do</option>
                <option value="in_progress" {% if task.status == 'in_progress' %}selected{% endif %}>In Progress</option>
                <option value="done"        {% if task.status == 'done'        %}selected{% endif %}>Done</option>
              </select>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Due Date</label>
            <input type="date" name="due_date" class="form-control"
                   value="{{ task.due_date.strftime('%Y-%m-%d') if task.due_date else '' }}"/>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary px-4">Save Changes</button>
            <a href="{{ url_for('project_tasks', project_id=task.project_id) }}"
               class="btn btn-outline-secondary px-4">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
