{% extends "base.html" %}
{% block title %}Profile{% endblock %}
{% block page_title %}My Profile{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <div style="width:72px;height:72px;border-radius:50%;background:#4f46e5;
                      display:flex;align-items:center;justify-content:center;
                      font-size:1.8rem;color:#fff;font-weight:700;margin:0 auto">
            {{ user.username[0].upper() }}
          </div>
          <h5 class="fw-semibold mt-2 mb-0">{{ user.username }}</h5>
          <div class="text-muted" style="font-size:.85rem">{{ user.email }}</div>
        </div>

        <hr/>

        <h6 class="fw-semibold mb-3"><i class="bi bi-pencil me-1" style="color:#4f46e5"></i>Update Info</h6>
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold">Username</label>
            <input type="text" name="username" class="form-control" value="{{ user.username }}" required/>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Email</label>
            <input type="email" name="email" class="form-control" value="{{ user.email }}" required/>
          </div>
          <button type="submit" class="btn btn-primary w-100">Save Changes</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
