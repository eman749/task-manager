{% extends "base.html" %}
{% block title %}New Project{% endblock %}
{% block page_title %}New Project{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-body p-4">
        <h5 class="fw-semibold mb-4"><i class="bi bi-folder-plus me-2" style="color:#4f46e5"></i>Create Project</h5>
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold">Project Name</label>
            <input type="text" name="name" class="form-control" placeholder="e.g. Website Redesign" required/>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Description <span class="text-muted fw-normal">(optional)</span></label>
            <textarea name="description" class="form-control" rows="3" placeholder="What is this project about?"></textarea>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary px-4">Create Project</button>
            <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary px-4">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
